<!DOCTYPE html>
<html>
<head>
  <title>Meeting Copilot — Mic</title>
  <style>
    body {
      margin: 0;
      padding: 16px 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #374151;
      background: #f9fafb;
    }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-weight: 500; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; flex-shrink: 0;
    }
    .dot.active { background: #22c55e; animation: pulse 1.2s infinite; }
    .dot.error  { background: #ef4444; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .hint { font-size: 11px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">Requesting microphone access…</span>
  </div>
  <div class="hint" id="hint">Allow the prompt above. This window handles your mic audio.</div>
  <script src="request-mic-permission.js"></script>
</body>
</html>
